services:
  - type: web
    name: smc-journal
    env: node
    plan: starter          # persistent disk requires paid plan
    buildCommand: npm install && npm run build
    startCommand: npm run db:migrate && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /data/journal.db
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: PORT
        value: 3000
    disk:
      name: smc-journal-data
      mountPath: /data
      sizeGB: 1
